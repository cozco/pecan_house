<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" preserveAspectRatio="xMidYMid meet">
  <!-- Background (transparent by default; rect for cream fill version) -->
  <rect width="600" height="600" fill="#F5F1E8"/>

  <!-- LEFT FOLIAGE (compact pecan branch) -->
  <g transform="translate(60, 140)" stroke="#5C5D3A" stroke-width="2" fill="none">
    <path d="M 60 320 Q 55 240 60 160 Q 65 90 70 30" stroke-width="2.5"/>
    <g fill="#8A8B5C" stroke="#5C5D3A" stroke-width="1.2">
      <path d="M 70 30 Q 50 15 35 0 Q 45 15 60 28 Z"/>
      <path d="M 70 30 Q 90 15 105 0 Q 95 15 80 28 Z"/>
      <path d="M 65 80 Q 35 65 15 50 Q 30 75 55 80 Z"/>
      <path d="M 65 80 Q 95 65 115 50 Q 100 75 75 80 Z"/>
      <path d="M 62 140 Q 30 125 10 110 Q 30 140 55 142 Z"/>
      <path d="M 62 140 Q 95 125 115 110 Q 95 140 70 142 Z"/>
      <path d="M 60 200 Q 30 190 12 175 Q 28 200 55 202 Z"/>
      <path d="M 60 200 Q 90 190 110 175 Q 92 200 65 202 Z"/>
      <path d="M 58 260 Q 32 252 15 240 Q 32 262 55 262 Z"/>
      <path d="M 58 260 Q 88 252 105 240 Q 88 262 65 262 Z"/>
    </g>
    <g fill="#5A4530" stroke="#2B2419" stroke-width="0.8">
      <ellipse cx="78" cy="105" rx="4" ry="7"/>
      <ellipse cx="80" cy="170" rx="4" ry="7"/>
      <ellipse cx="50" cy="225" rx="4" ry="7"/>
    </g>
  </g>

  <!-- RIGHT FOLIAGE (oak/varied) -->
  <g transform="translate(420, 170)" stroke="#5C5D3A" stroke-width="2" fill="none">
    <path d="M 50 290 Q 55 220 50 150 Q 45 90 55 30" stroke-width="2.5"/>
    <g fill="#8A8B5C" stroke="#5C5D3A" stroke-width="1.2">
      <ellipse cx="30" cy="50" rx="16" ry="10" transform="rotate(-25 30 50)"/>
      <ellipse cx="80" cy="50" rx="16" ry="10" transform="rotate(25 80 50)"/>
      <ellipse cx="25" cy="105" rx="18" ry="11" transform="rotate(-30 25 105)"/>
      <ellipse cx="85" cy="105" rx="18" ry="11" transform="rotate(30 85 105)"/>
      <ellipse cx="22" cy="160" rx="20" ry="12" transform="rotate(-30 22 160)"/>
      <ellipse cx="88" cy="160" rx="20" ry="12" transform="rotate(30 88 160)"/>
      <ellipse cx="25" cy="215" rx="18" ry="11" transform="rotate(-25 25 215)"/>
      <ellipse cx="85" cy="215" rx="18" ry="11" transform="rotate(25 85 215)"/>
      <ellipse cx="35" cy="265" rx="14" ry="9" transform="rotate(-15 35 265)"/>
      <ellipse cx="75" cy="265" rx="14" ry="9" transform="rotate(15 75 265)"/>
    </g>
  </g>

  <!-- HOUSE -->
  <g transform="translate(150, 130)" stroke="#2B2419" fill="none">
    <!-- Foundation shrubs -->
    <g fill="#8A8B5C" opacity="0.85" stroke="#5C5D3A" stroke-width="0.8">
      <ellipse cx="20" cy="320" rx="16" ry="10"/>
      <ellipse cx="280" cy="320" rx="16" ry="10"/>
    </g>

    <!-- House body -->
    <rect x="30" y="135" width="240" height="180" fill="#F5F1E8" stroke-width="2"/>
    <!-- Foundation -->
    <rect x="22" y="300" width="256" height="15" fill="#8A8B5C" opacity="0.4" stroke-width="1"/>

    <!-- Main hipped roof -->
    <polygon points="22,135 150,40 278,135" fill="#F5F1E8" stroke-width="2"/>

    <!-- Roof shingle texture -->
    <g stroke="#5C5D3A" stroke-width="0.6" opacity="0.6" fill="none">
      <line x1="40" y1="128" x2="150" y2="55"/>
      <line x1="70" y1="115" x2="150" y2="65"/>
      <line x1="100" y1="105" x2="150" y2="75"/>
      <line x1="150" y1="55" x2="260" y2="128"/>
      <line x1="150" y1="65" x2="230" y2="115"/>
      <line x1="150" y1="75" x2="200" y2="105"/>
    </g>

    <!-- Central gable -->
    <polygon points="120,135 150,90 180,135" fill="#F5F1E8" stroke-width="1.5"/>
    <rect x="142" y="112" width="16" height="22" fill="#E5DDC8" stroke-width="1"/>
    <line x1="150" y1="112" x2="150" y2="134" stroke-width="0.5"/>

    <!-- Chimney -->
    <rect x="220" y="35" width="20" height="60" fill="#F5F1E8" stroke-width="1.5"/>
    <rect x="217" y="33" width="26" height="6" fill="#F5F1E8" stroke-width="1.5"/>

    <!-- Top dormer windows -->
    <rect x="105" y="100" width="16" height="22" fill="#E5DDC8" stroke-width="1"/>
    <rect x="179" y="100" width="16" height="22" fill="#E5DDC8" stroke-width="1"/>

    <!-- Porch roof -->
    <rect x="15" y="217" width="270" height="11" fill="#F5F1E8" stroke-width="1.5"/>

    <!-- Porch columns -->
    <g stroke-width="1.5" fill="#F5F1E8">
      <rect x="30" y="228" width="8" height="87"/>
      <rect x="92" y="228" width="8" height="87"/>
      <rect x="200" y="228" width="8" height="87"/>
      <rect x="262" y="228" width="8" height="87"/>
    </g>

    <!-- Porch railings -->
    <g stroke-width="1.2">
      <line x1="38" y1="285" x2="92" y2="285"/>
      <line x1="38" y1="295" x2="92" y2="295"/>
      <line x1="208" y1="285" x2="262" y2="285"/>
      <line x1="208" y1="295" x2="262" y2="295"/>
    </g>
    <g stroke-width="0.6">
      <line x1="46" y1="285" x2="46" y2="315"/>
      <line x1="55" y1="285" x2="55" y2="315"/>
      <line x1="64" y1="285" x2="64" y2="315"/>
      <line x1="73" y1="285" x2="73" y2="315"/>
      <line x1="82" y1="285" x2="82" y2="315"/>
      <line x1="216" y1="285" x2="216" y2="315"/>
      <line x1="225" y1="285" x2="225" y2="315"/>
      <line x1="234" y1="285" x2="234" y2="315"/>
      <line x1="243" y1="285" x2="243" y2="315"/>
      <line x1="252" y1="285" x2="252" y2="315"/>
    </g>

    <!-- Upper floor windows -->
    <g fill="#E5DDC8" stroke-width="1.5">
      <rect x="50" y="150" width="32" height="55"/>
      <rect x="105" y="150" width="32" height="55"/>
      <rect x="163" y="150" width="32" height="55"/>
      <rect x="218" y="150" width="32" height="55"/>
    </g>
    <g stroke-width="0.6" opacity="0.7">
      <line x1="66" y1="150" x2="66" y2="205"/>
      <line x1="50" y1="178" x2="82" y2="178"/>
      <line x1="121" y1="150" x2="121" y2="205"/>
      <line x1="105" y1="178" x2="137" y2="178"/>
      <line x1="179" y1="150" x2="179" y2="205"/>
      <line x1="163" y1="178" x2="195" y2="178"/>
      <line x1="234" y1="150" x2="234" y2="205"/>
      <line x1="218" y1="178" x2="250" y2="178"/>
    </g>

    <!-- Trim line between floors -->
    <line x1="30" y1="217" x2="270" y2="217" stroke-width="1.2"/>

    <!-- Front door -->
    <rect x="135" y="240" width="30" height="75" fill="#5A4530" stroke-width="1.5"/>
    <rect x="140" y="248" width="20" height="30" fill="#3F2F1F" stroke-width="0.6"/>
    <rect x="140" y="285" width="20" height="15" fill="#3F2F1F" stroke-width="0.6"/>
    <circle cx="158" cy="282" r="1.5" fill="#5C5D3A"/>

    <!-- Steps -->
    <rect x="128" y="315" width="44" height="5" fill="#F5F1E8" stroke-width="1"/>
    <rect x="120" y="320" width="60" height="5" fill="#F5F1E8" stroke-width="1" opacity="0.9"/>

    <!-- Lower windows flanking door -->
    <g fill="#E5DDC8" stroke-width="1.5">
      <rect x="48" y="240" width="40" height="45"/>
      <rect x="212" y="240" width="40" height="45"/>
    </g>
    <g stroke-width="0.6" opacity="0.7">
      <line x1="68" y1="240" x2="68" y2="285"/>
      <line x1="48" y1="262" x2="88" y2="262"/>
      <line x1="232" y1="240" x2="232" y2="285"/>
      <line x1="212" y1="262" x2="252" y2="262"/>
    </g>
  </g>
</svg>
