<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="redWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6B3E36"/>
      <stop offset="100%" stop-color="#4A2A24"/>
    </linearGradient>
    <linearGradient id="redLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F1E8" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#F5F1E8" stop-opacity="0.1"/>
    </linearGradient>
  </defs>

  <!-- Wall -->
  <rect width="1200" height="900" fill="url(#redWall)"/>

  <!-- Wainscoting / panel detail along bottom -->
  <rect y="600" width="1200" height="240" fill="#3A1F1A" opacity="0.5"/>
  <line x1="0" y1="600" x2="1200" y2="600" stroke="#8A8B5C" stroke-width="2" opacity="0.4"/>
  <g stroke="#8A8B5C" stroke-width="1" opacity="0.3" fill="none">
    <rect x="60" y="630" width="180" height="180"/>
    <rect x="280" y="630" width="180" height="180"/>
    <rect x="500" y="630" width="180" height="180"/>
    <rect x="720" y="630" width="180" height="180"/>
    <rect x="940" y="630" width="180" height="180"/>
  </g>

  <!-- Ceiling crown -->
  <rect width="1200" height="30" fill="#5C5D3A" opacity="0.5"/>
  <line x1="0" y1="40" x2="1200" y2="40" stroke="#8A8B5C" stroke-width="1" opacity="0.5"/>

  <!-- Ornate window -->
  <g transform="translate(450, 150)">
    <rect x="0" y="0" width="300" height="380" fill="#F5F1E8" opacity="0.85"/>
    <rect x="0" y="0" width="300" height="380" fill="none" stroke="#2B2419" stroke-width="3"/>
    <line x1="150" y1="0" x2="150" y2="380" stroke="#2B2419" stroke-width="2"/>
    <line x1="0" y1="190" x2="300" y2="190" stroke="#2B2419" stroke-width="2"/>
    <line x1="75" y1="0" x2="75" y2="380" stroke="#2B2419" stroke-width="0.8" opacity="0.6"/>
    <line x1="225" y1="0" x2="225" y2="380" stroke="#2B2419" stroke-width="0.8" opacity="0.6"/>
    <rect x="0" y="0" width="300" height="380" fill="url(#redLight)"/>
    <!-- Decorative top -->
    <path d="M -15 0 Q 150 -25 315 0" fill="#5C5D3A" stroke="#2B2419" stroke-width="2"/>
  </g>

  <!-- Heavy drapes -->
  <g fill="#3A1F1A" opacity="0.85">
    <path d="M 420 130 Q 430 350 420 580 L 460 580 Q 460 350 460 130 Z"/>
    <path d="M 740 130 Q 750 350 740 580 L 780 580 Q 780 350 780 130 Z"/>
  </g>
  <g fill="#5C5D3A" opacity="0.4">
    <path d="M 430 140 Q 440 350 430 570 L 450 570 Q 450 350 450 140 Z"/>
    <path d="M 750 140 Q 760 350 750 570 L 770 570 Q 770 350 770 140 Z"/>
  </g>

  <!-- Chandelier (smaller, dramatic) -->
  <g transform="translate(600, 60)">
    <line x1="0" y1="0" x2="0" y2="50" stroke="#8A8B5C" stroke-width="2"/>
    <g fill="#8A8B5C" opacity="0.8">
      <line x1="0" y1="50" x2="-30" y2="80" stroke="#8A8B5C" stroke-width="1.5"/>
      <line x1="0" y1="50" x2="30" y2="80" stroke="#8A8B5C" stroke-width="1.5"/>
      <line x1="0" y1="50" x2="0" y2="85" stroke="#8A8B5C" stroke-width="1.5"/>
    </g>
    <g fill="#F5F1E8">
      <ellipse cx="-30" cy="85" rx="6" ry="10"/>
      <ellipse cx="0" cy="90" rx="6" ry="10"/>
      <ellipse cx="30" cy="85" rx="6" ry="10"/>
    </g>
  </g>

  <!-- Bed (centered, regal) -->
  <g transform="translate(360, 500)">
    <!-- Tall headboard -->
    <rect x="80" y="0" width="320" height="180" fill="#3A1F1A" stroke="#2B2419" stroke-width="2"/>
    <rect x="100" y="20" width="280" height="140" fill="none" stroke="#8A8B5C" stroke-width="1.5" opacity="0.7"/>
    <rect x="120" y="40" width="240" height="100" fill="none" stroke="#8A8B5C" stroke-width="1" opacity="0.5"/>
    <!-- Decorative top -->
    <path d="M 80 0 Q 240 -25 400 0" fill="#3A1F1A" stroke="#2B2419" stroke-width="2"/>
    <!-- Bedding -->
    <rect x="40" y="160" width="400" height="100" fill="#F5F1E8"/>
    <rect x="40" y="160" width="400" height="100" fill="none" stroke="#A89F8C" stroke-width="1.5"/>
    <!-- Pillows -->
    <rect x="100" y="130" width="110" height="40" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1.5" rx="4"/>
    <rect x="220" y="130" width="110" height="40" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1.5" rx="4"/>
    <rect x="340" y="130" width="60" height="40" fill="#6B3E36" stroke="#A89F8C" stroke-width="1.5" rx="4"/>
    <!-- Foot of bed runner -->
    <rect x="40" y="240" width="400" height="20" fill="#5C5D3A" opacity="0.8"/>
  </g>

  <!-- Side tables -->
  <g transform="translate(220, 620)">
    <rect x="0" y="0" width="100" height="120" fill="#2B2419" stroke="#8A8B5C" stroke-width="1"/>
    <rect x="10" y="10" width="80" height="40" fill="none" stroke="#8A8B5C" stroke-width="0.8" opacity="0.6"/>
    <rect x="10" y="60" width="80" height="50" fill="none" stroke="#8A8B5C" stroke-width="0.8" opacity="0.6"/>
    <!-- Lamp -->
    <rect x="40" y="-50" width="20" height="50" fill="#8A8B5C"/>
    <ellipse cx="50" cy="-55" rx="30" ry="10" fill="#F5F1E8"/>
    <path d="M 25 -50 L 75 -50 L 70 -65 L 30 -65 Z" fill="#E5DDC8"/>
  </g>
  <g transform="translate(880, 620)">
    <rect x="0" y="0" width="100" height="120" fill="#2B2419" stroke="#8A8B5C" stroke-width="1"/>
    <rect x="10" y="10" width="80" height="40" fill="none" stroke="#8A8B5C" stroke-width="0.8" opacity="0.6"/>
    <rect x="10" y="60" width="80" height="50" fill="none" stroke="#8A8B5C" stroke-width="0.8" opacity="0.6"/>
    <rect x="40" y="-50" width="20" height="50" fill="#8A8B5C"/>
    <ellipse cx="50" cy="-55" rx="30" ry="10" fill="#F5F1E8"/>
    <path d="M 25 -50 L 75 -50 L 70 -65 L 30 -65 Z" fill="#E5DDC8"/>
  </g>

  <!-- Rug -->
  <ellipse cx="600" cy="850" rx="500" ry="50" fill="#3A1F1A"/>
  <ellipse cx="600" cy="850" rx="450" ry="40" fill="none" stroke="#8A8B5C" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="600" cy="850" rx="380" ry="32" fill="none" stroke="#8A8B5C" stroke-width="1" opacity="0.4"/>

  <!-- Floor -->
  <rect y="870" width="1200" height="30" fill="#1F140E"/>

  <!-- Room label -->
  <g transform="translate(600, 30)" text-anchor="middle">
    <text fill="#F5F1E8" font-family="Georgia, serif" font-size="14" letter-spacing="4" opacity="0.5">THE RED ROOM</text>
  </g>
</svg>
