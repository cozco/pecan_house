<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bayWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFE9DA"/>
      <stop offset="100%" stop-color="#E5DDC8"/>
    </linearGradient>
    <linearGradient id="bayLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F5F1E8" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Wall -->
  <rect width="1200" height="900" fill="url(#bayWall)"/>

  <!-- Crown molding -->
  <rect width="1200" height="20" fill="#A89F8C" opacity="0.5"/>

  <!-- Bay window setup -->
  <g transform="translate(150, 100)">
    <!-- Left built-in shelves -->
    <rect x="0" y="0" width="140" height="500" fill="#5C5D3A" opacity="0.3" stroke="#8A8B5C" stroke-width="1.5"/>
    <g stroke="#8A8B5C" stroke-width="1" opacity="0.7">
      <line x1="0" y1="80" x2="140" y2="80"/>
      <line x1="0" y1="160" x2="140" y2="160"/>
      <line x1="0" y1="240" x2="140" y2="240"/>
      <line x1="0" y1="320" x2="140" y2="320"/>
      <line x1="0" y1="400" x2="140" y2="400"/>
    </g>
    <!-- Books on shelves -->
    <g fill="#5C5D3A" opacity="0.8">
      <rect x="20" y="50" width="10" height="30"/>
      <rect x="35" y="55" width="8" height="25"/>
      <rect x="48" y="48" width="12" height="32"/>
      <rect x="65" y="52" width="9" height="28"/>
      <rect x="80" y="50" width="11" height="30"/>
      <rect x="100" y="55" width="8" height="25"/>

      <rect x="20" y="130" width="11" height="30"/>
      <rect x="36" y="135" width="9" height="25"/>
      <rect x="50" y="128" width="10" height="32"/>
      <rect x="68" y="132" width="12" height="28"/>

      <rect x="60" y="290" width="60" height="30" rx="2"/>
    </g>
    <g fill="#8A8B5C" opacity="0.7">
      <rect x="25" y="210" width="10" height="30"/>
      <rect x="40" y="215" width="8" height="25"/>
      <rect x="55" y="208" width="11" height="32"/>
      <rect x="75" y="212" width="9" height="28"/>
      <rect x="95" y="210" width="10" height="30"/>
    </g>
    <!-- Decorative object -->
    <ellipse cx="70" cy="370" rx="20" ry="8" fill="#5C5D3A" opacity="0.7"/>
    <rect x="55" y="350" width="30" height="20" fill="#5C5D3A" opacity="0.7"/>

    <!-- Bay window center -->
    <rect x="180" y="40" width="540" height="380" fill="#F5F1E8" opacity="0.95"/>
    <rect x="180" y="40" width="540" height="380" fill="none" stroke="#A89F8C" stroke-width="3"/>
    <line x1="360" y1="40" x2="360" y2="420" stroke="#A89F8C" stroke-width="2"/>
    <line x1="540" y1="40" x2="540" y2="420" stroke="#A89F8C" stroke-width="2"/>
    <line x1="180" y1="230" x2="720" y2="230" stroke="#A89F8C" stroke-width="2"/>
    <!-- Light pouring through -->
    <rect x="180" y="40" width="540" height="380" fill="url(#bayLight)"/>
    <!-- View suggestion: tree silhouettes -->
    <g fill="#8A8B5C" opacity="0.4">
      <ellipse cx="240" cy="350" rx="40" ry="60"/>
      <ellipse cx="450" cy="320" rx="50" ry="70"/>
      <ellipse cx="640" cy="360" rx="45" ry="55"/>
    </g>

    <!-- Right built-in shelves -->
    <rect x="760" y="0" width="140" height="500" fill="#5C5D3A" opacity="0.3" stroke="#8A8B5C" stroke-width="1.5"/>
    <g stroke="#8A8B5C" stroke-width="1" opacity="0.7">
      <line x1="760" y1="80" x2="900" y2="80"/>
      <line x1="760" y1="160" x2="900" y2="160"/>
      <line x1="760" y1="240" x2="900" y2="240"/>
      <line x1="760" y1="320" x2="900" y2="320"/>
      <line x1="760" y1="400" x2="900" y2="400"/>
    </g>
    <g fill="#5C5D3A" opacity="0.8">
      <rect x="780" y="50" width="10" height="30"/>
      <rect x="795" y="55" width="8" height="25"/>
      <rect x="808" y="48" width="12" height="32"/>
      <rect x="825" y="52" width="9" height="28"/>
      <rect x="840" y="50" width="11" height="30"/>
      <rect x="858" y="55" width="8" height="25"/>

      <rect x="780" y="130" width="11" height="30"/>
      <rect x="796" y="135" width="9" height="25"/>
      <rect x="810" y="128" width="10" height="32"/>
      <rect x="828" y="132" width="12" height="28"/>
    </g>
    <g fill="#8A8B5C" opacity="0.7">
      <rect x="785" y="210" width="10" height="30"/>
      <rect x="800" y="215" width="8" height="25"/>
      <rect x="815" y="208" width="11" height="32"/>
      <rect x="835" y="212" width="9" height="28"/>
      <rect x="855" y="210" width="10" height="30"/>
    </g>
    <!-- Plant in pot -->
    <g transform="translate(820, 300)">
      <path d="M 0 30 L 30 30 L 25 60 L 5 60 Z" fill="#5C5D3A"/>
      <g fill="#8A8B5C" opacity="0.85">
        <ellipse cx="15" cy="15" rx="12" ry="20"/>
        <ellipse cx="5" cy="20" rx="10" ry="15"/>
        <ellipse cx="25" cy="20" rx="10" ry="15"/>
      </g>
    </g>

    <!-- Window seat / cushion -->
    <rect x="180" y="420" width="540" height="40" fill="#5C5D3A" opacity="0.6"/>
    <rect x="180" y="420" width="540" height="40" fill="none" stroke="#2B2419" stroke-width="1.5"/>
    <g fill="#F5F1E8" opacity="0.85" stroke="#A89F8C" stroke-width="1">
      <rect x="200" y="395" width="80" height="35" rx="4"/>
      <rect x="290" y="395" width="80" height="35" rx="4"/>
      <rect x="540" y="395" width="80" height="35" rx="4"/>
      <rect x="630" y="395" width="80" height="35" rx="4"/>
    </g>
    <rect x="180" y="460" width="540" height="6" fill="#2B2419"/>
  </g>

  <!-- Bed (placed to the side, suggesting room layout) -->
  <g transform="translate(120, 660)">
    <!-- Headboard -->
    <rect x="0" y="0" width="280" height="100" fill="#5C5D3A" opacity="0.8" stroke="#2B2419" stroke-width="1.5"/>
    <!-- Mattress -->
    <rect x="-20" y="80" width="320" height="80" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1.5"/>
    <!-- Pillows -->
    <rect x="20" y="60" width="80" height="35" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1.5" rx="4"/>
    <rect x="120" y="60" width="80" height="35" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1.5" rx="4"/>
    <rect x="220" y="60" width="60" height="35" fill="#8A8B5C" opacity="0.6" stroke="#A89F8C" stroke-width="1" rx="4"/>
    <!-- Throw -->
    <rect x="-20" y="140" width="320" height="20" fill="#5C5D3A" opacity="0.6"/>
  </g>

  <!-- Side chair -->
  <g transform="translate(900, 690)">
    <rect x="0" y="0" width="80" height="80" fill="#A89F8C" opacity="0.6" stroke="#5C5D3A" stroke-width="1.5"/>
    <rect x="0" y="0" width="80" height="120" fill="none" stroke="#5C5D3A" stroke-width="1.5"/>
    <rect x="0" y="80" width="80" height="40" fill="#A89F8C" opacity="0.4"/>
    <line x1="10" y1="120" x2="10" y2="160" stroke="#2B2419" stroke-width="2"/>
    <line x1="70" y1="120" x2="70" y2="160" stroke="#2B2419" stroke-width="2"/>
  </g>

  <!-- Floor -->
  <rect y="820" width="1200" height="80" fill="#A89F8C" opacity="0.6"/>
  <g stroke="#8A8B5C" stroke-width="0.8" opacity="0.4">
    <line x1="0" y1="840" x2="1200" y2="840"/>
    <line x1="0" y1="860" x2="1200" y2="860"/>
    <line x1="0" y1="880" x2="1200" y2="880"/>
  </g>

  <!-- Room label -->
  <g transform="translate(600, 870)" text-anchor="middle">
    <text fill="#5C5D3A" font-family="Georgia, serif" font-size="14" letter-spacing="4" opacity="0.7">THE BAY ROOM</text>
  </g>
</svg>
