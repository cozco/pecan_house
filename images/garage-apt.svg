<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="garageWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="100%" stop-color="#E5DDC8"/>
    </linearGradient>
    <linearGradient id="garageLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F5F1E8" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Wall -->
  <rect width="1200" height="900" fill="url(#garageWall)"/>

  <!-- Vaulted ceiling line -->
  <polygon points="0,0 1200,0 1100,80 100,80" fill="#A89F8C" opacity="0.3"/>
  <line x1="0" y1="80" x2="1200" y2="80" stroke="#8A8B5C" stroke-width="0.8" opacity="0.4"/>

  <!-- Exposed wood beam (carriage-house feel) -->
  <rect x="0" y="100" width="1200" height="20" fill="#5A4530" opacity="0.7"/>
  <line x1="0" y1="120" x2="1200" y2="120" stroke="#2B2419" stroke-width="1" opacity="0.6"/>

  <!-- Two windows (apartment-style) -->
  <g transform="translate(100, 160)">
    <rect x="0" y="0" width="240" height="280" fill="#F5F1E8" opacity="0.95"/>
    <rect x="0" y="0" width="240" height="280" fill="none" stroke="#A89F8C" stroke-width="3"/>
    <line x1="120" y1="0" x2="120" y2="280" stroke="#A89F8C" stroke-width="2"/>
    <line x1="0" y1="140" x2="240" y2="140" stroke="#A89F8C" stroke-width="2"/>
    <rect x="0" y="0" width="240" height="280" fill="url(#garageLight)"/>
    <g fill="#8A8B5C" opacity="0.4">
      <ellipse cx="60" cy="220" rx="40" ry="55"/>
      <ellipse cx="180" cy="240" rx="35" ry="45"/>
    </g>
  </g>

  <!-- Pendant lights -->
  <g transform="translate(420, 100)">
    <line x1="0" y1="20" x2="0" y2="80" stroke="#5C5D3A" stroke-width="1.5"/>
    <path d="M -25 80 L 25 80 L 20 110 L -20 110 Z" fill="#5C5D3A"/>
    <ellipse cx="0" cy="115" rx="20" ry="4" fill="#F5E8C8" opacity="0.8"/>
  </g>
  <g transform="translate(540, 100)">
    <line x1="0" y1="20" x2="0" y2="80" stroke="#5C5D3A" stroke-width="1.5"/>
    <path d="M -25 80 L 25 80 L 20 110 L -20 110 Z" fill="#5C5D3A"/>
    <ellipse cx="0" cy="115" rx="20" ry="4" fill="#F5E8C8" opacity="0.8"/>
  </g>

  <!-- Wall-mounted TV (apartment feature) -->
  <g transform="translate(800, 180)">
    <rect x="0" y="0" width="280" height="160" fill="#2B2419" stroke="#5C5D3A" stroke-width="2"/>
    <rect x="10" y="10" width="260" height="140" fill="#3F2F1F" opacity="0.9"/>
    <!-- Reflection suggestion -->
    <path d="M 30 30 L 60 30 L 50 60 L 20 60 Z" fill="#8A8B5C" opacity="0.2"/>
    <path d="M 200 80 L 250 80 L 240 130 L 190 130 Z" fill="#8A8B5C" opacity="0.15"/>
  </g>
  <!-- Vertical wall paneling behind TV -->
  <g stroke="#A89F8C" stroke-width="1" opacity="0.4" fill="none">
    <line x1="780" y1="160" x2="780" y2="380"/>
    <line x1="820" y1="160" x2="820" y2="380"/>
    <line x1="860" y1="160" x2="860" y2="380"/>
    <line x1="900" y1="160" x2="900" y2="380"/>
    <line x1="940" y1="160" x2="940" y2="380"/>
    <line x1="980" y1="160" x2="980" y2="380"/>
    <line x1="1020" y1="160" x2="1020" y2="380"/>
    <line x1="1060" y1="160" x2="1060" y2="380"/>
    <line x1="1100" y1="160" x2="1100" y2="380"/>
  </g>

  <!-- Sofa (modern, neutral) -->
  <g transform="translate(360, 540)">
    <!-- Back -->
    <rect x="0" y="0" width="380" height="100" fill="#A89F8C" opacity="0.7" stroke="#5C5D3A" stroke-width="1.5"/>
    <!-- Cushions on back -->
    <rect x="20" y="20" width="100" height="60" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1" rx="6" opacity="0.9"/>
    <rect x="140" y="20" width="100" height="60" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1" rx="6" opacity="0.9"/>
    <rect x="260" y="20" width="100" height="60" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1" rx="6" opacity="0.9"/>
    <!-- Seat -->
    <rect x="-10" y="80" width="400" height="80" fill="#5C5D3A" opacity="0.7" stroke="#2B2419" stroke-width="1.5"/>
    <line x1="120" y1="80" x2="120" y2="160" stroke="#2B2419" stroke-width="1" opacity="0.5"/>
    <line x1="240" y1="80" x2="240" y2="160" stroke="#2B2419" stroke-width="1" opacity="0.5"/>
    <!-- Throw pillow -->
    <rect x="20" y="60" width="50" height="40" fill="#5A4530" opacity="0.8" stroke="#A89F8C" stroke-width="1" rx="4"/>
    <rect x="320" y="60" width="50" height="40" fill="#8A8B5C" opacity="0.8" stroke="#A89F8C" stroke-width="1" rx="4"/>
    <!-- Legs -->
    <rect x="-10" y="160" width="6" height="30" fill="#2B2419"/>
    <rect x="384" y="160" width="6" height="30" fill="#2B2419"/>
  </g>

  <!-- Coffee table -->
  <g transform="translate(440, 740)">
    <ellipse cx="110" cy="20" rx="120" ry="20" fill="#5C5D3A" opacity="0.8" stroke="#2B2419" stroke-width="1.5"/>
    <ellipse cx="110" cy="15" rx="120" ry="20" fill="#5C5D3A" opacity="0.9" stroke="#2B2419" stroke-width="1.5"/>
    <line x1="40" y1="35" x2="40" y2="60" stroke="#2B2419" stroke-width="2"/>
    <line x1="180" y1="35" x2="180" y2="60" stroke="#2B2419" stroke-width="2"/>
    <!-- Items on table -->
    <ellipse cx="80" cy="10" rx="15" ry="4" fill="#A89F8C"/>
    <rect x="120" y="0" width="60" height="8" fill="#5A4530" rx="1"/>
    <rect x="118" y="-8" width="60" height="8" fill="#8A8B5C" rx="1"/>
  </g>

  <!-- Kitchenette to the right (suggesting full kitchen) -->
  <g transform="translate(820, 540)">
    <!-- Counter -->
    <rect x="0" y="120" width="280" height="20" fill="#2B2419"/>
    <!-- Cabinets below -->
    <rect x="0" y="140" width="280" height="120" fill="#5C5D3A" opacity="0.7" stroke="#2B2419" stroke-width="1.5"/>
    <line x1="70" y1="140" x2="70" y2="260" stroke="#2B2419" stroke-width="1" opacity="0.6"/>
    <line x1="140" y1="140" x2="140" y2="260" stroke="#2B2419" stroke-width="1" opacity="0.6"/>
    <line x1="210" y1="140" x2="210" y2="260" stroke="#2B2419" stroke-width="1" opacity="0.6"/>
    <g fill="#8A8B5C" opacity="0.7">
      <circle cx="35" cy="170" r="2"/>
      <circle cx="105" cy="170" r="2"/>
      <circle cx="175" cy="170" r="2"/>
      <circle cx="245" cy="170" r="2"/>
    </g>
    <!-- Backsplash items -->
    <rect x="20" y="60" width="40" height="60" fill="#A89F8C" opacity="0.6" rx="2"/>
    <rect x="80" y="80" width="20" height="40" fill="#5A4530" opacity="0.7"/>
    <ellipse cx="200" cy="100" rx="25" ry="20" fill="#8A8B5C" opacity="0.6"/>
    <!-- Open shelves (carriage-house casual) -->
    <line x1="0" y1="40" x2="280" y2="40" stroke="#5A4530" stroke-width="3"/>
    <line x1="0" y1="0" x2="280" y2="0" stroke="#5A4530" stroke-width="3"/>
    <g fill="#A89F8C" opacity="0.7">
      <rect x="20" y="10" width="14" height="30"/>
      <rect x="40" y="15" width="12" height="25"/>
      <rect x="58" y="8" width="14" height="32"/>
      <rect x="78" y="12" width="13" height="28"/>
    </g>
    <g fill="#8A8B5C" opacity="0.7">
      <ellipse cx="160" cy="30" rx="20" ry="6"/>
      <rect x="190" y="15" width="20" height="25"/>
    </g>
    <!-- Pendant over counter -->
    <line x1="240" y1="-30" x2="240" y2="20" stroke="#5C5D3A" stroke-width="1"/>
    <ellipse cx="240" cy="25" rx="15" ry="10" fill="#5C5D3A" opacity="0.8"/>
    <ellipse cx="240" cy="35" rx="14" ry="3" fill="#F5E8C8" opacity="0.8"/>
  </g>

  <!-- Rug under coffee table -->
  <g transform="translate(360, 800)">
    <rect x="0" y="0" width="400" height="50" fill="#5C5D3A" opacity="0.4"/>
    <g stroke="#A89F8C" stroke-width="1" opacity="0.5" fill="none">
      <line x1="0" y1="10" x2="400" y2="10"/>
      <line x1="0" y1="25" x2="400" y2="25"/>
      <line x1="0" y1="40" x2="400" y2="40"/>
      <!-- Geometric pattern -->
      <path d="M 30 5 L 60 25 L 30 45 L 0 25 Z"/>
      <path d="M 100 5 L 130 25 L 100 45 L 70 25 Z"/>
      <path d="M 170 5 L 200 25 L 170 45 L 140 25 Z"/>
      <path d="M 240 5 L 270 25 L 240 45 L 210 25 Z"/>
      <path d="M 310 5 L 340 25 L 310 45 L 280 25 Z"/>
      <path d="M 380 5 L 400 17 L 400 33 L 380 45 Z"/>
    </g>
  </g>

  <!-- Floor -->
  <rect y="855" width="1200" height="45" fill="#5A4530" opacity="0.5"/>
  <g stroke="#2B2419" stroke-width="0.8" opacity="0.5">
    <line x1="0" y1="870" x2="1200" y2="870"/>
    <line x1="0" y1="885" x2="1200" y2="885"/>
  </g>

  <!-- Room label -->
  <g transform="translate(600, 880)" text-anchor="middle">
    <text fill="#F5F1E8" font-family="Georgia, serif" font-size="14" letter-spacing="4" opacity="0.8">THE CARRIAGE HOUSE</text>
  </g>
</svg>
