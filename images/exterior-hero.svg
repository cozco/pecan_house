<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5F1E8"/>
      <stop offset="60%" stop-color="#EFE9DA"/>
      <stop offset="100%" stop-color="#E5DDC8"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A89F8C"/>
      <stop offset="100%" stop-color="#8A8B5C"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1600" height="900" fill="url(#sky)"/>

  <!-- Soft sun glow -->
  <circle cx="1200" cy="280" r="180" fill="#F5F1E8" opacity="0.6"/>
  <circle cx="1200" cy="280" r="120" fill="#F5F1E8" opacity="0.5"/>

  <!-- Distant tree line -->
  <g opacity="0.3" fill="#5C5D3A">
    <ellipse cx="100" cy="640" rx="80" ry="40"/>
    <ellipse cx="200" cy="630" rx="90" ry="45"/>
    <ellipse cx="320" cy="635" rx="70" ry="38"/>
    <ellipse cx="1380" cy="635" rx="85" ry="42"/>
    <ellipse cx="1500" cy="640" rx="75" ry="40"/>
  </g>

  <!-- Ground plane -->
  <rect y="680" width="1600" height="220" fill="url(#ground)" opacity="0.4"/>

  <!-- Left tree (pecan) -->
  <g transform="translate(280, 280)">
    <line x1="80" y1="380" x2="80" y2="120" stroke="#2B2419" stroke-width="6" opacity="0.8"/>
    <g fill="#5C5D3A" opacity="0.85">
      <ellipse cx="80" cy="120" rx="90" ry="60"/>
      <ellipse cx="50" cy="160" rx="70" ry="50"/>
      <ellipse cx="120" cy="155" rx="75" ry="50"/>
      <ellipse cx="80" cy="200" rx="85" ry="45"/>
      <ellipse cx="40" cy="220" rx="55" ry="40"/>
      <ellipse cx="125" cy="225" rx="60" ry="42"/>
    </g>
    <g fill="#8A8B5C" opacity="0.7">
      <ellipse cx="60" cy="140" rx="40" ry="30"/>
      <ellipse cx="100" cy="180" rx="35" ry="28"/>
      <ellipse cx="75" cy="210" rx="38" ry="30"/>
    </g>
  </g>

  <!-- Right tree -->
  <g transform="translate(1180, 300)">
    <line x1="80" y1="360" x2="80" y2="140" stroke="#2B2419" stroke-width="5" opacity="0.8"/>
    <g fill="#5C5D3A" opacity="0.85">
      <ellipse cx="80" cy="140" rx="80" ry="55"/>
      <ellipse cx="55" cy="175" rx="65" ry="45"/>
      <ellipse cx="110" cy="170" rx="70" ry="48"/>
      <ellipse cx="80" cy="215" rx="80" ry="42"/>
    </g>
    <g fill="#8A8B5C" opacity="0.7">
      <ellipse cx="65" cy="155" rx="35" ry="28"/>
      <ellipse cx="95" cy="195" rx="32" ry="26"/>
    </g>
  </g>

  <!-- Victorian house centerpiece -->
  <g transform="translate(560, 240)">
    <!-- House body -->
    <rect x="60" y="180" width="360" height="280" fill="#E5DDC8" stroke="#2B2419" stroke-width="2"/>

    <!-- Main roof -->
    <polygon points="40,180 240,80 440,180" fill="#5C5D3A" stroke="#2B2419" stroke-width="2"/>
    <polygon points="40,180 240,80 440,180" fill="#2B2419" opacity="0.15"/>

    <!-- Roof shingles texture (decorative lines) -->
    <g stroke="#2B2419" stroke-width="0.5" opacity="0.4" fill="none">
      <line x1="80" y1="170" x2="240" y2="100"/>
      <line x1="120" y1="160" x2="240" y2="115"/>
      <line x1="160" y1="150" x2="240" y2="130"/>
      <line x1="240" y1="100" x2="400" y2="170"/>
      <line x1="240" y1="115" x2="360" y2="160"/>
      <line x1="240" y1="130" x2="320" y2="150"/>
    </g>

    <!-- Central gable/dormer -->
    <polygon points="180,180 240,120 300,180" fill="#E5DDC8" stroke="#2B2419" stroke-width="1.5"/>
    <rect x="225" y="150" width="30" height="30" fill="#8A8B5C" opacity="0.6" stroke="#2B2419" stroke-width="1"/>

    <!-- Chimney -->
    <rect x="370" y="60" width="30" height="80" fill="#8A8B5C" stroke="#2B2419" stroke-width="1.5"/>

    <!-- Porch roof -->
    <rect x="40" y="320" width="400" height="20" fill="#5C5D3A" stroke="#2B2419" stroke-width="1.5"/>

    <!-- Porch columns -->
    <rect x="60" y="340" width="10" height="120" fill="#E5DDC8" stroke="#2B2419" stroke-width="1"/>
    <rect x="160" y="340" width="10" height="120" fill="#E5DDC8" stroke="#2B2419" stroke-width="1"/>
    <rect x="310" y="340" width="10" height="120" fill="#E5DDC8" stroke="#2B2419" stroke-width="1"/>
    <rect x="410" y="340" width="10" height="120" fill="#E5DDC8" stroke="#2B2419" stroke-width="1"/>

    <!-- Porch railings -->
    <line x1="70" y1="430" x2="160" y2="430" stroke="#2B2419" stroke-width="1.5"/>
    <line x1="320" y1="430" x2="410" y2="430" stroke="#2B2419" stroke-width="1.5"/>
    <g stroke="#2B2419" stroke-width="0.8">
      <line x1="80" y1="430" x2="80" y2="460"/>
      <line x1="95" y1="430" x2="95" y2="460"/>
      <line x1="110" y1="430" x2="110" y2="460"/>
      <line x1="125" y1="430" x2="125" y2="460"/>
      <line x1="140" y1="430" x2="140" y2="460"/>
      <line x1="155" y1="430" x2="155" y2="460"/>
      <line x1="330" y1="430" x2="330" y2="460"/>
      <line x1="345" y1="430" x2="345" y2="460"/>
      <line x1="360" y1="430" x2="360" y2="460"/>
      <line x1="375" y1="430" x2="375" y2="460"/>
      <line x1="390" y1="430" x2="390" y2="460"/>
      <line x1="405" y1="430" x2="405" y2="460"/>
    </g>

    <!-- Upper floor windows -->
    <g fill="#8A8B5C" opacity="0.7" stroke="#2B2419" stroke-width="1.5">
      <rect x="90" y="200" width="50" height="80"/>
      <rect x="170" y="200" width="50" height="80"/>
      <rect x="260" y="200" width="50" height="80"/>
      <rect x="340" y="200" width="50" height="80"/>
    </g>
    <g stroke="#2B2419" stroke-width="0.8" opacity="0.8">
      <line x1="115" y1="200" x2="115" y2="280"/>
      <line x1="90" y1="240" x2="140" y2="240"/>
      <line x1="195" y1="200" x2="195" y2="280"/>
      <line x1="170" y1="240" x2="220" y2="240"/>
      <line x1="285" y1="200" x2="285" y2="280"/>
      <line x1="260" y1="240" x2="310" y2="240"/>
      <line x1="365" y1="200" x2="365" y2="280"/>
      <line x1="340" y1="240" x2="390" y2="240"/>
    </g>

    <!-- Front door -->
    <rect x="220" y="370" width="40" height="90" fill="#2B2419"/>
    <rect x="225" y="380" width="30" height="40" fill="#5C5D3A" opacity="0.6"/>
    <circle cx="252" cy="425" r="2" fill="#8A8B5C"/>

    <!-- Steps -->
    <rect x="210" y="460" width="60" height="6" fill="#A89F8C"/>
    <rect x="200" y="466" width="80" height="6" fill="#A89F8C" opacity="0.8"/>

    <!-- Lower floor windows flanking door -->
    <g fill="#8A8B5C" opacity="0.6" stroke="#2B2419" stroke-width="1.5">
      <rect x="90" y="360" width="60" height="70"/>
      <rect x="330" y="360" width="60" height="70"/>
    </g>
    <g stroke="#2B2419" stroke-width="0.8" opacity="0.8">
      <line x1="120" y1="360" x2="120" y2="430"/>
      <line x1="90" y1="395" x2="150" y2="395"/>
      <line x1="360" y1="360" x2="360" y2="430"/>
      <line x1="330" y1="395" x2="390" y2="395"/>
    </g>

    <!-- Foundation shrubs -->
    <g fill="#5C5D3A" opacity="0.7">
      <ellipse cx="55" cy="460" rx="20" ry="12"/>
      <ellipse cx="425" cy="460" rx="22" ry="13"/>
      <ellipse cx="80" cy="465" rx="15" ry="10"/>
    </g>
  </g>

  <!-- Subtle ornamental flourish (echoing logo) -->
  <g transform="translate(800, 820)" opacity="0.5">
    <line x1="-200" y1="0" x2="-30" y2="0" stroke="#5C5D3A" stroke-width="1"/>
    <line x1="30" y1="0" x2="200" y2="0" stroke="#5C5D3A" stroke-width="1"/>
    <g fill="#5C5D3A">
      <ellipse cx="-15" cy="0" rx="6" ry="3" transform="rotate(-30 -15 0)"/>
      <ellipse cx="0" cy="-3" rx="5" ry="3"/>
      <ellipse cx="15" cy="0" rx="6" ry="3" transform="rotate(30 15 0)"/>
    </g>
  </g>
</svg>
