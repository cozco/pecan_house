<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="twinWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EFE9DA"/>
      <stop offset="100%" stop-color="#E5DDC8"/>
    </linearGradient>
    <linearGradient id="twinLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#F5F1E8" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Wall -->
  <rect width="1200" height="900" fill="url(#twinWall)"/>

  <!-- Ceiling line -->
  <rect width="1200" height="15" fill="#A89F8C" opacity="0.4"/>

  <!-- Window between beds -->
  <g transform="translate(500, 140)">
    <rect x="0" y="0" width="200" height="320" fill="#F5F1E8" opacity="0.95"/>
    <rect x="0" y="0" width="200" height="320" fill="none" stroke="#A89F8C" stroke-width="3"/>
    <line x1="100" y1="0" x2="100" y2="320" stroke="#A89F8C" stroke-width="2"/>
    <line x1="0" y1="160" x2="200" y2="160" stroke="#A89F8C" stroke-width="2"/>
    <rect x="0" y="0" width="200" height="320" fill="url(#twinLight)"/>
    <!-- Outside greenery -->
    <g fill="#8A8B5C" opacity="0.4">
      <ellipse cx="60" cy="240" rx="40" ry="50"/>
      <ellipse cx="140" cy="260" rx="35" ry="45"/>
    </g>
  </g>

  <!-- Curtains -->
  <g fill="#F5F1E8" opacity="0.85" stroke="#A89F8C" stroke-width="1">
    <path d="M 480 130 Q 490 280 480 470 L 510 470 Q 505 280 505 130 Z"/>
    <path d="M 695 130 Q 700 280 695 470 L 720 470 Q 715 280 720 130 Z"/>
  </g>

  <!-- Wall art above window -->
  <g transform="translate(560, 80)">
    <rect x="0" y="0" width="80" height="50" fill="#F5F1E8" stroke="#5C5D3A" stroke-width="1.5"/>
    <g fill="#8A8B5C" opacity="0.6">
      <circle cx="40" cy="25" r="12"/>
      <path d="M 15 38 Q 40 28 65 38" fill="none" stroke="#5C5D3A" stroke-width="1"/>
    </g>
  </g>

  <!-- Left twin bed -->
  <g transform="translate(120, 520)">
    <!-- Headboard -->
    <rect x="40" y="0" width="280" height="120" fill="#5C5D3A" opacity="0.7" stroke="#2B2419" stroke-width="1.5"/>
    <rect x="60" y="20" width="240" height="80" fill="none" stroke="#8A8B5C" stroke-width="1" opacity="0.7"/>
    <!-- Mattress (twin = narrower) -->
    <rect x="20" y="100" width="320" height="80" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1.5"/>
    <!-- Pillow -->
    <rect x="60" y="80" width="120" height="40" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1.5" rx="4"/>
    <rect x="200" y="80" width="100" height="40" fill="#8A8B5C" opacity="0.6" stroke="#A89F8C" stroke-width="1.5" rx="4"/>
    <!-- Throw -->
    <rect x="20" y="160" width="320" height="20" fill="#5C5D3A" opacity="0.6"/>
    <!-- Stuffed toy on pillow -->
    <circle cx="120" cy="92" r="10" fill="#A89F8C" opacity="0.8"/>
    <circle cx="115" cy="89" r="2" fill="#2B2419"/>
    <circle cx="125" cy="89" r="2" fill="#2B2419"/>
    <circle cx="120" cy="95" r="1.5" fill="#5C5D3A"/>
    <!-- Bed legs -->
    <rect x="20" y="180" width="6" height="40" fill="#5C5D3A"/>
    <rect x="334" y="180" width="6" height="40" fill="#5C5D3A"/>
  </g>

  <!-- Right twin bed -->
  <g transform="translate(760, 520)">
    <!-- Headboard -->
    <rect x="40" y="0" width="280" height="120" fill="#5C5D3A" opacity="0.7" stroke="#2B2419" stroke-width="1.5"/>
    <rect x="60" y="20" width="240" height="80" fill="none" stroke="#8A8B5C" stroke-width="1" opacity="0.7"/>
    <!-- Mattress -->
    <rect x="20" y="100" width="320" height="80" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1.5"/>
    <!-- Pillow -->
    <rect x="60" y="80" width="120" height="40" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1.5" rx="4"/>
    <rect x="200" y="80" width="100" height="40" fill="#8A8B5C" opacity="0.6" stroke="#A89F8C" stroke-width="1.5" rx="4"/>
    <!-- Throw -->
    <rect x="20" y="160" width="320" height="20" fill="#5C5D3A" opacity="0.6"/>
    <!-- Book on bed -->
    <rect x="240" y="155" width="50" height="8" fill="#5C5D3A" transform="rotate(-5 265 159)"/>
    <!-- Bed legs -->
    <rect x="20" y="180" width="6" height="40" fill="#5C5D3A"/>
    <rect x="334" y="180" width="6" height="40" fill="#5C5D3A"/>
  </g>

  <!-- Shared nightstand between beds -->
  <g transform="translate(540, 600)">
    <rect x="0" y="0" width="120" height="140" fill="#A89F8C" opacity="0.6" stroke="#5C5D3A" stroke-width="1.5"/>
    <line x1="60" y1="0" x2="60" y2="140" stroke="#5C5D3A" stroke-width="0.8" opacity="0.5"/>
    <rect x="10" y="20" width="100" height="40" fill="none" stroke="#5C5D3A" stroke-width="0.8" opacity="0.6"/>
    <rect x="10" y="70" width="100" height="50" fill="none" stroke="#5C5D3A" stroke-width="0.8" opacity="0.6"/>
    <!-- Lamp -->
    <rect x="50" y="-50" width="20" height="50" fill="#A89F8C"/>
    <ellipse cx="60" cy="-55" rx="32" ry="10" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1"/>
    <path d="M 32 -50 L 88 -50 L 78 -68 L 42 -68 Z" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1"/>
    <!-- Alarm clock -->
    <rect x="-30" y="-25" width="30" height="20" fill="#5C5D3A" rx="2"/>
    <text x="-15" y="-10" fill="#F5F1E8" font-family="monospace" font-size="8" text-anchor="middle">7:00</text>
  </g>

  <!-- Patterned rug -->
  <ellipse cx="600" cy="820" rx="500" ry="40" fill="#8A8B5C" opacity="0.4"/>
  <ellipse cx="600" cy="820" rx="450" ry="35" fill="none" stroke="#5C5D3A" stroke-width="1" opacity="0.5"/>
  <ellipse cx="600" cy="820" rx="380" ry="30" fill="none" stroke="#5C5D3A" stroke-width="1" opacity="0.4"/>
  <g stroke="#5C5D3A" stroke-width="0.8" opacity="0.4" fill="none">
    <path d="M 250 820 Q 600 800 950 820"/>
    <path d="M 280 825 Q 600 810 920 825"/>
  </g>

  <!-- Floor -->
  <rect y="855" width="1200" height="45" fill="#A89F8C" opacity="0.5"/>

  <!-- Room label -->
  <g transform="translate(600, 880)" text-anchor="middle">
    <text fill="#5C5D3A" font-family="Georgia, serif" font-size="14" letter-spacing="4" opacity="0.7">THE TWIN ROOM</text>
  </g>
</svg>
