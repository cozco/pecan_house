<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="walnutWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5A4530"/>
      <stop offset="100%" stop-color="#3F2F1F"/>
    </linearGradient>
    <linearGradient id="walnutLight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5E8C8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#E5DDC8" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <!-- Wall -->
  <rect width="1200" height="900" fill="url(#walnutWall)"/>

  <!-- Wood paneling lower wall -->
  <rect y="500" width="1200" height="340" fill="#2B2419" opacity="0.6"/>
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#8A8B5C" stroke-width="1.5" opacity="0.5"/>
  <g stroke="#8A8B5C" stroke-width="0.8" opacity="0.3" fill="none">
    <line x1="0" y1="540" x2="1200" y2="540"/>
    <rect x="60" y="560" width="160" height="220"/>
    <rect x="240" y="560" width="160" height="220"/>
    <rect x="800" y="560" width="160" height="220"/>
    <rect x="980" y="560" width="160" height="220"/>
  </g>

  <!-- Crown molding -->
  <rect width="1200" height="20" fill="#8A8B5C" opacity="0.4"/>
  <line x1="0" y1="25" x2="1200" y2="25" stroke="#8A8B5C" stroke-width="1" opacity="0.5"/>

  <!-- Built-in bookshelves left -->
  <g transform="translate(60, 80)">
    <rect x="0" y="0" width="200" height="400" fill="#2B2419" stroke="#8A8B5C" stroke-width="1.5" opacity="0.9"/>
    <g stroke="#8A8B5C" stroke-width="1" opacity="0.6">
      <line x1="0" y1="80" x2="200" y2="80"/>
      <line x1="0" y1="160" x2="200" y2="160"/>
      <line x1="0" y1="240" x2="200" y2="240"/>
      <line x1="0" y1="320" x2="200" y2="320"/>
    </g>
    <!-- Books -->
    <g fill="#5C5D3A" opacity="0.85">
      <rect x="20" y="40" width="14" height="40"/>
      <rect x="38" y="35" width="12" height="45"/>
      <rect x="55" y="42" width="14" height="38"/>
      <rect x="74" y="38" width="13" height="42"/>
      <rect x="92" y="40" width="14" height="40"/>
      <rect x="112" y="36" width="12" height="44"/>
      <rect x="130" y="42" width="14" height="38"/>
      <rect x="150" y="40" width="13" height="40"/>
      <rect x="170" y="38" width="12" height="42"/>

      <rect x="20" y="120" width="13" height="40"/>
      <rect x="38" y="115" width="14" height="45"/>
      <rect x="58" y="122" width="12" height="38"/>
      <rect x="75" y="118" width="14" height="42"/>
      <rect x="95" y="120" width="13" height="40"/>
    </g>
    <g fill="#8A8B5C" opacity="0.7">
      <rect x="115" y="116" width="14" height="44"/>
      <rect x="135" y="120" width="12" height="40"/>
      <rect x="152" y="118" width="13" height="42"/>
      <rect x="170" y="122" width="11" height="38"/>

      <rect x="20" y="200" width="14" height="40"/>
      <rect x="38" y="195" width="12" height="45"/>
      <rect x="55" y="202" width="14" height="38"/>
      <rect x="74" y="198" width="13" height="42"/>
    </g>
    <g fill="#A89F8C" opacity="0.7">
      <rect x="92" y="200" width="14" height="40"/>
      <rect x="112" y="196" width="12" height="44"/>
      <rect x="130" y="202" width="14" height="38"/>
      <rect x="150" y="200" width="13" height="40"/>
      <rect x="170" y="198" width="12" height="42"/>
    </g>
    <!-- Decorative items -->
    <g transform="translate(40, 280)">
      <rect x="0" y="20" width="40" height="20" fill="#8A8B5C" opacity="0.6"/>
      <rect x="5" y="0" width="30" height="20" fill="#5C5D3A" opacity="0.7"/>
    </g>
    <g transform="translate(110, 290)">
      <ellipse cx="20" cy="30" rx="20" ry="6" fill="#8A8B5C" opacity="0.7"/>
      <path d="M 5 30 Q 20 0 35 30" fill="#5C5D3A" opacity="0.7"/>
    </g>
    <!-- Reading lamp on shelf -->
    <g transform="translate(150, 330)">
      <rect x="0" y="20" width="20" height="40" fill="#8A8B5C"/>
      <ellipse cx="10" cy="15" rx="20" ry="8" fill="#F5E8C8" opacity="0.8"/>
      <path d="M -10 20 L 30 20 L 25 5 L -5 5 Z" fill="#A89F8C" opacity="0.7"/>
    </g>
  </g>

  <!-- Built-in bookshelves right -->
  <g transform="translate(940, 80)">
    <rect x="0" y="0" width="200" height="400" fill="#2B2419" stroke="#8A8B5C" stroke-width="1.5" opacity="0.9"/>
    <g stroke="#8A8B5C" stroke-width="1" opacity="0.6">
      <line x1="0" y1="80" x2="200" y2="80"/>
      <line x1="0" y1="160" x2="200" y2="160"/>
      <line x1="0" y1="240" x2="200" y2="240"/>
      <line x1="0" y1="320" x2="200" y2="320"/>
    </g>
    <g fill="#5C5D3A" opacity="0.85">
      <rect x="20" y="40" width="14" height="40"/>
      <rect x="38" y="35" width="12" height="45"/>
      <rect x="55" y="42" width="14" height="38"/>
      <rect x="74" y="38" width="13" height="42"/>
      <rect x="95" y="40" width="14" height="40"/>
      <rect x="115" y="36" width="12" height="44"/>
      <rect x="133" y="42" width="14" height="38"/>
      <rect x="152" y="40" width="13" height="40"/>
      <rect x="170" y="38" width="12" height="42"/>
    </g>
    <g fill="#A89F8C" opacity="0.7">
      <rect x="20" y="120" width="13" height="40"/>
      <rect x="38" y="115" width="14" height="45"/>
      <rect x="58" y="122" width="12" height="38"/>
      <rect x="75" y="118" width="14" height="42"/>
      <rect x="95" y="120" width="13" height="40"/>
    </g>
    <g fill="#8A8B5C" opacity="0.7">
      <rect x="115" y="116" width="14" height="44"/>
      <rect x="135" y="120" width="12" height="40"/>
      <rect x="152" y="118" width="13" height="42"/>
      <rect x="170" y="122" width="11" height="38"/>
    </g>
    <!-- Plant -->
    <g transform="translate(40, 270)">
      <path d="M 0 30 L 30 30 L 25 60 L 5 60 Z" fill="#8A8B5C"/>
      <g fill="#5C5D3A" opacity="0.85">
        <ellipse cx="15" cy="10" rx="14" ry="22"/>
        <ellipse cx="3" cy="18" rx="10" ry="15"/>
        <ellipse cx="27" cy="18" rx="10" ry="15"/>
      </g>
    </g>
    <!-- Decorative bowl -->
    <g transform="translate(110, 350)">
      <ellipse cx="20" cy="20" rx="22" ry="6" fill="#A89F8C" opacity="0.7"/>
      <path d="M -2 20 Q 20 -5 42 20" fill="#8A8B5C" opacity="0.7" stroke="#5C5D3A" stroke-width="0.8"/>
    </g>
  </g>

  <!-- Window in middle -->
  <g transform="translate(380, 100)">
    <rect x="0" y="0" width="440" height="380" fill="#F5E8C8" opacity="0.9"/>
    <rect x="0" y="0" width="440" height="380" fill="none" stroke="#8A8B5C" stroke-width="3"/>
    <line x1="220" y1="0" x2="220" y2="380" stroke="#8A8B5C" stroke-width="2"/>
    <line x1="0" y1="190" x2="440" y2="190" stroke="#8A8B5C" stroke-width="2"/>
    <line x1="110" y1="0" x2="110" y2="380" stroke="#8A8B5C" stroke-width="0.8" opacity="0.6"/>
    <line x1="330" y1="0" x2="330" y2="380" stroke="#8A8B5C" stroke-width="0.8" opacity="0.6"/>
    <rect x="0" y="0" width="440" height="380" fill="url(#walnutLight)"/>
    <!-- Outside view -->
    <g fill="#8A8B5C" opacity="0.5">
      <ellipse cx="100" cy="320" rx="60" ry="80"/>
      <ellipse cx="220" cy="290" rx="50" ry="70"/>
      <ellipse cx="340" cy="320" rx="55" ry="75"/>
    </g>
  </g>

  <!-- Heavy walnut drapes -->
  <g fill="#3F2F1F" opacity="0.9">
    <path d="M 360 90 Q 370 280 360 480 L 400 480 Q 400 280 400 90 Z"/>
    <path d="M 800 90 Q 810 280 800 480 L 840 480 Q 840 280 840 90 Z"/>
  </g>

  <!-- Bed (lower-center, with walnut frame) -->
  <g transform="translate(380, 540)">
    <!-- Walnut headboard -->
    <rect x="20" y="0" width="400" height="140" fill="#2B2419" stroke="#8A8B5C" stroke-width="2"/>
    <rect x="40" y="20" width="360" height="100" fill="none" stroke="#8A8B5C" stroke-width="1.2" opacity="0.7"/>
    <rect x="60" y="40" width="320" height="60" fill="none" stroke="#8A8B5C" stroke-width="0.8" opacity="0.5"/>
    <!-- Mattress -->
    <rect x="0" y="120" width="440" height="90" fill="#F5F1E8"/>
    <rect x="0" y="120" width="440" height="90" fill="none" stroke="#A89F8C" stroke-width="1.5"/>
    <!-- Pillows -->
    <rect x="50" y="100" width="110" height="35" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1.5" rx="4"/>
    <rect x="170" y="100" width="110" height="35" fill="#F5F1E8" stroke="#A89F8C" stroke-width="1.5" rx="4"/>
    <rect x="290" y="100" width="100" height="35" fill="#5A4530" opacity="0.8" stroke="#A89F8C" stroke-width="1.5" rx="4"/>
    <!-- Throw -->
    <rect x="0" y="190" width="440" height="20" fill="#5C5D3A" opacity="0.7"/>
  </g>

  <!-- Reading chair in corner -->
  <g transform="translate(280, 660)">
    <!-- Wing-back style -->
    <rect x="0" y="0" width="80" height="120" fill="#5C5D3A" opacity="0.7" stroke="#2B2419" stroke-width="1.5"/>
    <rect x="-10" y="60" width="100" height="80" fill="#5C5D3A" opacity="0.7" stroke="#2B2419" stroke-width="1.5"/>
    <rect x="-10" y="140" width="100" height="20" fill="#2B2419"/>
    <line x1="0" y1="160" x2="0" y2="180" stroke="#2B2419" stroke-width="2"/>
    <line x1="80" y1="160" x2="80" y2="180" stroke="#2B2419" stroke-width="2"/>
    <!-- Cushion -->
    <rect x="-5" y="55" width="90" height="20" fill="#A89F8C" opacity="0.6" rx="3"/>
  </g>

  <!-- Floor -->
  <rect y="850" width="1200" height="50" fill="#1F140E"/>
  <g stroke="#3F2F1F" stroke-width="1" opacity="0.6">
    <line x1="0" y1="870" x2="1200" y2="870"/>
    <line x1="0" y1="890" x2="1200" y2="890"/>
  </g>

  <!-- Room label -->
  <g transform="translate(600, 50)" text-anchor="middle">
    <text fill="#F5E8C8" font-family="Georgia, serif" font-size="14" letter-spacing="4" opacity="0.6">THE WALNUT ROOM</text>
  </g>
</svg>
